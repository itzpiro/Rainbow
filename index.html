<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Welcome -->
<div id="welcomePage" class="page active">
  <h1>Hey… I made something for you 💫</h1>
  <button onclick="goToDevice()">Open</button>
</div>

<!-- Device -->
<div id="devicePage" class="page">
  <h2>How are you viewing this? 🤍</h2>
  <button onclick="selectDevice('phone')">📱 Phone</button>
  <button onclick="selectDevice('laptop')">💻 Laptop</button>
</div>

<!-- Story Gallery -->
<div id="galleryPage" class="page">
  <div class="story-container">

    <!-- Counter -->
    <div class="top-bar">
      <span id="counter">1 / 6</span>
    </div>

    <!-- Image -->
    <img id="imageDisplay" src="images/1.jpg">

    <!-- Final Button -->
    <button id="finalBtn" onclick="showMessage()">Tap here…</button>

    <!-- Final Message -->
    <div id="finalMessage">
      I didn’t know how to say this directly…  
      but you’ve become someone really important to me 💫
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
